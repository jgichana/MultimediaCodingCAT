<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Save Our Wildlife</title>
	<link rel="stylesheet" href="index.css">
</head>
<body>
	<main class="page">
        <h1>Save Our Wildlife!</h1>
		<figure class="video-section">
			<video id="wildlifeVideo" class="video-player" controls aria-label="Wildlife conservation video">
				<source src="wildlife.mp4" type="video/mp4">
				Your browser does not support the video tag.
			</video>
			<figcaption id="videoDescription">
				A majestic cheetah strolls through the grassy African Savannah.
			</figcaption>
		</figure>

		<button id="videoActionButton" type="button" aria-controls="wildlifeVideo" aria-pressed="false">
			Hide video
		</button>
	</main>

	<script src="index.js"></script>
</body>
</html>
